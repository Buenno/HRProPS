name: Pester Tests

on:
    push:
        branches:
            - main
            - "**"
    pull_request:
    workflow_dispatch:

jobs:
    pester-tests:
        name: Run Pester Tests
        runs-on: windows-latest

        steps:
            - name: Check out repository code
              uses: actions/checkout@v4

            - name: Ensure PowerShell module directory exists
              shell: pwsh
              run: |
                $path = "$HOME/.local/share/powershell/Modules"
                if (-not (Test-Path $path)) {
                    New-Item -ItemType Directory -Path $path | Out-Null
                }

            - name: Cache PowerShell modules
              uses: actions/cache@v4
              with:
                  path: ~/.local/share/powershell/Modules
                  key: pwsh-modules-${{ runner.os }}-${{ hashFiles('**/requirements.psd1') }}
                  restore-keys: pwsh-modules-${{ runner.os }}

            - name: Install Pester
              shell: pwsh
              run: Install-Module Pester -Force -Scope CurrentUser

            - name: Install Dependencies
              shell: pwsh
              run: |
                  Install-Module "Microsoft.PowerShell.SecretManagement","Microsoft.PowerShell.SecretStore","InvokeBuild" -Force -Scope CurrentUser

            - name: Build Module
              shell: pwsh
              run: Invoke-Build -File ./build.ps1 -Task Build
            
            - name: Run Pester Tests
              shell: pwsh
              run: Invoke-Pester -CI -PassThru
